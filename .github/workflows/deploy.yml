name: Production Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'deployment_guide.md'
      - '.github/workflows/**'

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Deploy Traegger
        run: |
          # 1. Enter the live production directory
          cd /home/rahul/traegger
          
          # 2. Pull latest code changes from main
          git pull origin main

          # 3. Rebuild images with the new code
          docker compose build

          # 4. Apply database migrations (using the updated backend image)
          docker compose run --rm backend alembic upgrade head

          # 5. Restart services with the new images
          docker compose up -d

          # 6. Housekeeping: cleanup unused Docker objects to save disk
          docker image prune -f
