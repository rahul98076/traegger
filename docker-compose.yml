services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: traegger_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      # Override the DB URL inside docker so data is mapped to the persistent volume
      - DATABASE_URL=sqlite+aiosqlite:////data/pennys.db
    volumes:
      - ./backend/pennys.db:/data/pennys.db
      - ./backend/traegger-c0901-firebase-adminsdk-fbsvc-e92b5c9c29.json:/app/traegger-c0901-firebase-adminsdk-fbsvc-e92b5c9c29.json
    networks:
      - traegger-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: traegger_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - traegger-network

volumes:
  traegger-db-data:


networks:
  traegger-network:
    driver: bridge
